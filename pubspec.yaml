name: reflexion_technician_app
description: Reflexion CAFM Technician Field Service App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Network
  dio: ^5.7.0
  connectivity_plus: ^6.1.4

  # Local Database (Offline-first)
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # Data Classes / Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Camera + Media
  image_picker: ^1.1.2

  # Maps
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2

  # Signature
  hand_signature: ^3.0.2

  # Barcode Scanning
  mobile_scanner: ^6.0.5

  # Charts
  fl_chart: ^0.70.2

  # UI Components
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2

  # Permissions
  permission_handler: ^11.4.0

  # Date/Time
  intl: ^0.20.0

  # Misc
  uuid: ^4.5.1
  collection: ^1.19.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.4
  drift_dev: ^2.22.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
